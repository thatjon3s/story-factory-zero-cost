name: Produce review video
on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: story-production
  cancel-in-progress: false
jobs:
  produce:
    if: vars.AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALLOW_PAID_API: "false"
      MAX_EPISODE_COST_USD: "0"
      SCENE_LEASE_SECONDS: "7200"
      OLLAMA_MODEL: "qwen3:4b"
      PIPER_MODEL_PATH: "de_DE-thorsten-medium"
      PIPER_DATA_DIR: "piper-voices"
      RENDER_ARTIFACT_DIR: "render-artifacts"
      CC0_CHARACTER_ASSETS: "cc0-character-assets"
      PIPELINE_TARGET: "8"
      AUTO_UNIVERSE_NAME: ${{ vars.AUTO_UNIVERSE_NAME || 'Story Factory Universe' }}
      AUTO_SERIES_NAME: ${{ vars.AUTO_SERIES_NAME || 'Die letzte Leitung' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r zero_cost/requirements.txt
      - name: Install local story model and renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin blender unzip
          mkdir -p cc0-character-assets
          curl -fL --retry 4 \
            "https://opengameart.org/sites/default/files/ultimate_animated_character_pack_by_quaternius.zip" \
            -o /tmp/cc0-characters.zip
          unzip -q /tmp/cc0-characters.zip -d cc0-character-assets
          mkdir -p "$PIPER_DATA_DIR"
          python -m piper.download_voices --data-dir "$PIPER_DATA_DIR" "$PIPER_MODEL_PATH"
          test -s "$PIPER_DATA_DIR/$PIPER_MODEL_PATH.onnx"
          test -s "$PIPER_DATA_DIR/$PIPER_MODEL_PATH.onnx.json"
          printf 'Dies ist der automatische Stimmtest.' | \
            piper --data-dir "$PIPER_DATA_DIR" --model "$PIPER_MODEL_PATH" \
              --output_file /tmp/piper-smoke.wav
          test -s /tmp/piper-smoke.wav
          for attempt in $(seq 1 5); do
            if curl -fsSL --retry 4 --retry-all-errors \
              https://ollama.com/install.sh -o /tmp/install-ollama.sh &&
              sh /tmp/install-ollama.sh &&
              command -v ollama >/dev/null; then
              break
            fi
            echo "Ollama installation attempt $attempt failed; retrying..."
            sleep $((attempt * 10))
          done
          command -v ollama >/dev/null
          ollama serve >/tmp/ollama.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:11434/api/tags >/dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:11434/api/tags >/dev/null
          ollama pull "$OLLAMA_MODEL"
      - name: Produce video
        run: |
          set -o pipefail
          python zero_cost/worker.py produce 2>&1 | tee /tmp/story-factory.log
      - name: Upload render for quality review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 3d-render-review
          path: render-artifacts/*.mp4
          if-no-files-found: ignore
          retention-days: 1
      - name: Show local model diagnostics
        if: failure()
        run: |
          if [ -f /tmp/ollama.log ]; then
            {
              echo
              echo "===== OLLAMA DIAGNOSTICS ====="
              tail -n 200 /tmp/ollama.log
            } | tee -a /tmp/story-factory.log
          fi
