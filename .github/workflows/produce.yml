name: Produce review video
on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
concurrency:
  group: story-production
  cancel-in-progress: false
jobs:
  produce:
    if: vars.AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ github.token }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_EXTERNAL_MONTHLY_EUR: "0"
      ALLOW_PAID_API: "false"
      OLLAMA_MODEL: "qwen3:4b"
      PIPELINE_TARGET: "8"
      AUTO_SERIES_NAME: "Die letzte Leitung"
      PIPER_MODEL_PATH: ${{ github.workspace }}/voices/de_DE-thorsten_emotional-medium.onnx
      NARRATOR_PITCH: "0.94"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r zero_cost/requirements.txt piper-tts==1.3.0
      - name: Install free local model and renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve >/tmp/ollama.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:11434/api/tags >/dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:11434/api/tags >/dev/null
          ollama pull "$OLLAMA_MODEL"
      - name: Download German voice
        run: |
          mkdir -p voices
          curl -fL -o voices/de_DE-thorsten_emotional-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten_emotional/medium/de_DE-thorsten_emotional-medium.onnx
          curl -fL -o voices/de_DE-thorsten_emotional-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten_emotional/medium/de_DE-thorsten_emotional-medium.onnx.json
      - run: python zero_cost/worker.py produce
