name: Produce review video
on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: story-production
  cancel-in-progress: false
jobs:
  produce:
    if: vars.AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KREA_API_TOKEN: ${{ secrets.KREA_API_TOKEN }}
      KREA_IMAGE_ENDPOINT: "/generate/image/google/nano-banana"
      KREA_VIDEO_ENDPOINT: "/generate/video/xai/grok-video-1.5"
      KREA_VIDEO_RESOLUTION: "1080p"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALLOW_PAID_API: "false"
      MAX_EPISODE_COST_USD: "0"
      SCENE_LEASE_SECONDS: "7200"
      OLLAMA_MODEL: "qwen3:4b"
      PIPELINE_TARGET: "8"
      AUTO_UNIVERSE_NAME: ${{ vars.AUTO_UNIVERSE_NAME || 'Story Factory Universe' }}
      AUTO_SERIES_NAME: ${{ vars.AUTO_SERIES_NAME || 'Die letzte Leitung' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r zero_cost/requirements.txt
      - name: Install local story model and renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve >/tmp/ollama.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:11434/api/tags >/dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:11434/api/tags >/dev/null
          ollama pull "$OLLAMA_MODEL"
      - name: Produce video
        run: |
          set -o pipefail
          python zero_cost/worker.py produce 2>&1 | tee /tmp/story-factory.log
      - name: Show local model diagnostics
        if: failure()
        run: |
          if [ -f /tmp/ollama.log ]; then
            {
              echo
              echo "===== OLLAMA DIAGNOSTICS ====="
              tail -n 200 /tmp/ollama.log
            } | tee -a /tmp/story-factory.log
          fi
